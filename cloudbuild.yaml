steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '--build-arg'
  - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'
  - '-t'
  - 'gcr.io/$PROJECT_ID/fridgehero'
  - '.'
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'fridgehero'
  - '--image'
  - 'gcr.io/$PROJECT_ID/fridgehero'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
images:
- 'gcr.io/$PROJECT_ID/fridgehero'
substitutions:
  _VITE_GEMINI_API_KEY: ''
