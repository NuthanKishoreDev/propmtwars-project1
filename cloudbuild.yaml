availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/VITE_GEMINI_API_KEY/versions/latest
    env: 'GEMINI_API_KEY'
steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker build --build-arg VITE_GEMINI_API_KEY=$$GEMINI_API_KEY -t gcr.io/$PROJECT_ID/fridgehero .
  secretEnv: ['GEMINI_API_KEY']
images:
- 'gcr.io/$PROJECT_ID/fridgehero'
